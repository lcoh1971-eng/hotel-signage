<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración — Señalización Hotel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8962E;--gold-l:#D4AF5A;--gold-pale:#F5EDD6;
  --dark:#1A1A1A;--surface:#F8F6F1;--border:rgba(184,150,46,0.25);
  --text:#2C2C2A;--muted:#888780;--white:#fff;
  --danger:#A32D2D;--success:#3B6D11;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#222;border:1px solid var(--border);border-radius:14px;padding:48px 40px;width:340px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold-l);letter-spacing:.08em;margin-bottom:4px}
.login-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:32px}
.login-box input{width:100%;padding:11px 14px;background:#2A2A2A;border:1px solid rgba(184,150,46,.3);border-radius:7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:14px}
.login-box input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.04em}
.login-btn:hover{background:var(--gold-l)}
.login-err{color:#E57373;font-size:12px;margin-top:10px;display:none}

/* TOPBAR */
.topbar{background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold-l);letter-spacing:.06em}
.topbar-nav{display:flex;gap:4px}
.nav-btn{padding:7px 16px;background:transparent;border:none;color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all .15s}
.nav-btn.active{background:rgba(184,150,46,.15);color:var(--gold-l)}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.logout-btn{padding:6px 14px;border:1px solid rgba(184,150,46,.25);background:transparent;color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;border-radius:5px;letter-spacing:.06em}
.logout-btn:hover{color:var(--gold-l);border-color:var(--gold)}

/* PANELS */
.panel{display:none;min-height:calc(100vh - 52px)}.panel.active{display:block}

/* ── EVENTOS ── */
.ev-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 52px)}
.sidebar{background:var(--dark);padding:20px 0;border-right:1px solid var(--border)}
.sb-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 18px 12px}
.salon-item{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;transition:background .15s}
.salon-item:hover{background:rgba(255,255,255,.04)}
.salon-item.sel{background:rgba(184,150,46,.12);border-left:2px solid var(--gold)}
.salon-nm{font-size:13px;color:rgba(255,255,255,.8)}
.salon-st{font-size:10px;padding:2px 8px;border-radius:20px}
.st-on{background:rgba(59,109,17,.25);color:#7FBB3A}
.st-off{background:rgba(136,135,128,.15);color:rgba(255,255,255,.3)}
.st-soon{background:rgba(184,150,46,.2);color:var(--gold-l)}
.sb-add{margin:12px 14px 0;width:calc(100% - 28px);padding:8px;background:rgba(184,150,46,.1);border:1px solid var(--border);color:var(--gold-l);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;border-radius:5px}
.sb-add:hover{background:rgba(184,150,46,.2)}

.main{padding:28px 32px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.sec-sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

/* Date nav */
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.date-nav button{width:30px;height:30px;border:0.5px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.date-nav button:hover{border-color:var(--gold);color:var(--gold)}
.date-nav input[type=date]{padding:6px 10px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none}
.date-nav input[type=date]:focus{border-color:var(--gold)}

/* Event cards */
.ev-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.ev-card{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:14px 18px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.ev-card:hover{border-color:rgba(184,150,46,.5)}
.ev-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.ev-nm{font-size:14px;font-weight:500}
.ev-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--gold-pale);color:#7A6115;letter-spacing:.05em}
.ev-meta{font-size:12px;color:var(--muted);display:flex;gap:14px}
.ev-meta span{display:flex;align-items:center;gap:4px}
.ev-actions{display:flex;gap:6px}
.ic-btn{width:30px;height:30px;border:.5px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;color:var(--muted);font-size:13px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ic-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.ic-btn.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(163,45,45,.06)}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* FORM */
.form-card{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:24px}
.form-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;padding-bottom:14px;border-bottom:.5px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.s1{grid-template-columns:1fr}
.form-row.s3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
input[type=text],input[type=date],input[type=time],select,textarea{width:100%;padding:9px 12px;border:.5px solid rgba(136,135,128,.4);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);background:var(--white)}
textarea{resize:none;height:58px}
.img-drop{border:1.5px dashed rgba(136,135,128,.35);border-radius:8px;padding:18px;text-align:center;cursor:pointer;position:relative;background:var(--surface);transition:border-color .15s;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.img-drop:hover{border-color:var(--gold)}
.img-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-drop-txt{font-size:11px;color:var(--muted)}
.img-thumb{width:100%;height:80px;object-fit:cover;border-radius:6px;display:none}
.color-row{display:flex;gap:8px;flex-wrap:wrap;padding-top:4px}
.cswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.cswatch.sel{border-color:var(--dark)}
.form-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:18px;border-top:.5px solid var(--border)}
.btn-sec{padding:8px 16px;border:.5px solid var(--border);background:transparent;border-radius:6px;font-size:13px;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif}
.btn-pri{padding:8px 22px;background:var(--gold);border:none;border-radius:6px;font-size:13px;cursor:pointer;color:#fff;font-family:'DM Sans',sans-serif;font-weight:500;transition:background .15s}
.btn-pri:hover{background:var(--gold-l)}
.btn-pri:disabled{background:var(--muted);cursor:not-allowed}

/* Saving indicator */
.saving{font-size:12px;color:var(--muted);display:none;align-items:center;gap:6px}
.saving.show{display:flex}

/* ── AGENDA ── */
.agenda-wrap{padding:28px 32px}
.agenda-grid-wrap{overflow-x:auto}
.agenda-grid{display:grid;min-width:600px;border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.ag-head{display:grid;background:var(--dark)}
.ag-cell{padding:10px 14px;border-right:.5px solid rgba(255,255,255,.08);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.ag-cell:last-child{border-right:none}
.ag-row{display:grid;border-top:.5px solid var(--border)}
.ag-row:hover{background:rgba(184,150,46,.03)}
.ag-time{padding:10px 14px;font-size:11px;color:var(--muted);border-right:.5px solid var(--border);background:rgba(248,246,241,.7)}
.ag-slot{padding:6px 10px;border-right:.5px solid var(--border);min-height:44px;position:relative}
.ag-slot:last-child{border-right:none}
.ag-ev{border-radius:5px;padding:5px 8px;font-size:11px}
.ag-ev-nm{font-weight:500}
.ag-ev-hr{font-size:10px;opacity:.7;margin-top:1px}
.type-boda{background:rgba(184,150,46,.15);border-left:2px solid var(--gold)}
.type-boda .ag-ev-nm{color:#7A6115}
.type-corp{background:rgba(55,138,221,.1);border-left:2px solid #378ADD}
.type-corp .ag-ev-nm{color:#185FA5}
.type-soc{background:rgba(212,83,126,.1);border-left:2px solid #D4537E}
.type-soc .ag-ev-nm{color:#993556}
.type-otro{background:rgba(136,135,128,.12);border-left:2px solid var(--muted)}
.type-otro .ag-ev-nm{color:var(--muted)}

/* ── SALONES MGR ── */
.salones-wrap{padding:28px 32px}
.salones-tbl{width:100%;border-collapse:collapse;background:var(--white);border-radius:10px;overflow:hidden;border:.5px solid var(--border)}
.salones-tbl th{background:var(--dark);color:rgba(255,255,255,.55);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:12px 16px;text-align:left;font-weight:400}
.salones-tbl td{padding:12px 16px;border-bottom:.5px solid var(--border);font-size:13px}
.salones-tbl tr:last-child td{border-bottom:none}
.salones-tbl tr:hover td{background:rgba(248,246,241,.6)}
.salon-url{font-size:11px;color:var(--muted);font-family:monospace}
.toggle-sw{width:36px;height:20px;background:var(--muted);border-radius:20px;cursor:pointer;position:relative;transition:background .2s;border:none}
.toggle-sw.on{background:var(--success)}
.toggle-sw::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle-sw.on::after{left:19px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;border-left:3px solid var(--gold);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-left-color:var(--danger)}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo" style="margin-bottom:12px;">
  <div style="background:white;padding:12px 20px;border-radius:8px;display:inline-block;">
    <img src="https://gumnnqpaieooxkvhneqi.supabase.co/storage/v1/object/public/imagenes-eventos/Logo-MARRIOTT-PANAMA-HOTEL.png" alt="Marriott Panama" style="height:70px;width:auto;display:block;">
  </div>
</div>
    <div class="login-sub">Gestión de señalización DigiSign</div>
    <input type="password" id="pwd-input" placeholder="Contraseña de administrador" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="login-err">Contraseña incorrecta</div>
  </div>
</div>

<!-- ══ TOPBAR ══ -->
<div class="topbar" style="display:none" id="topbar">
<div class="topbar-logo">
  <div style="background:white;padding:4px 10px;border-radius:5px;display:inline-block;">
    <img src="https://gumnnqpaieooxkvhneqi.supabase.co/storage/v1/object/public/imagenes-eventos/Logo-MARRIOTT-PANAMA-HOTEL.png" alt="Marriott Panama" style="height:28px;width:auto;display:block;">
  </div>
</div>
<div class="topbar-nav">
    <button class="nav-btn active" onclick="showPanel('eventos')">Eventos</button>
    <button class="nav-btn" onclick="showPanel('agenda')">Agenda</button>
    <button class="nav-btn" onclick="showPanel('salones')">Salones</button>
  </div>
  <button class="logout-btn" onclick="doLogout()">Salir</button>
</div>

<!-- ══ PANEL: EVENTOS ══ -->
<div id="panel-eventos" class="panel active" style="display:none">
  <div class="ev-layout">
    <aside class="sidebar">
      <div class="sb-title">Salones</div>
      <div id="sidebar-salones"></div>
      <button class="sb-add" onclick="openSalonForm()">+ Agregar salón</button>
    </aside>
    <div class="main">
      <div class="sec-hdr">
        <div>
          <div class="sec-title" id="ev-salon-title">Selecciona un salón</div>
          <div class="sec-sub" id="ev-salon-url"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="saving" id="saving-indicator">
            <span style="width:8px;height:8px;background:var(--gold);border-radius:50%;display:inline-block;animation:pulse 1s infinite"></span>
            Guardando...
          </span>
          <button class="btn-pri" id="new-ev-btn" onclick="openEventForm()" style="display:none">+ Nuevo evento</button>
        </div>
      </div>
      <div class="date-nav">
        <button onclick="changeDate(-1)">‹</button>
        <input type="date" id="fecha-filtro" onchange="loadEventos()">
        <button onclick="changeDate(1)">›</button>
        <span style="font-size:12px;color:var(--muted)" id="fecha-label"></span>
      </div>
      <div id="ev-list" class="ev-list">
        <div class="empty-state">Selecciona un salón para ver sus eventos</div>
      </div>
      <div id="ev-form" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ══ PANEL: AGENDA ══ -->
<div id="panel-agenda" class="panel" style="display:none">
  <div class="agenda-wrap">
    <div class="sec-hdr">
      <div>
        <div class="sec-title">Agenda del día</div>
        <div class="sec-sub" id="agenda-fecha-label"></div>
      </div>
      <div class="date-nav" style="margin:0">
        <button onclick="changeAgendaDate(-1)">‹</button>
        <input type="date" id="agenda-fecha" onchange="loadAgenda()">
        <button onclick="changeAgendaDate(1)">›</button>
      </div>
    </div>
    <div class="agenda-grid-wrap">
      <div id="agenda-grid"></div>
    </div>
  </div>
</div>

<!-- ══ PANEL: SALONES ══ -->
<div id="panel-salones" class="panel" style="display:none">
  <div class="salones-wrap">
    <div class="sec-hdr">
      <div class="sec-title">Gestión de salones</div>
      <button class="btn-pri" onclick="openSalonForm()">+ Nuevo salón</button>
    </div>
    <table class="salones-tbl">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>URL de tableta</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="salones-tbody"></tbody>
    </table>
    <div id="salon-form-area" style="margin-top:20px;display:none"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<style>
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>

<script>
const BASE = '/.netlify/functions';
let TOKEN = '';
let activeSalonId = null;
let activeSalonSlug = '';
let allSalones = [];
let selectedColor = '#B8962E';
let editingEventId = null;
let editingSalonId = null;

// ── AUTH ──
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const r = await fetch(`${BASE}/auth`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: pwd })
  });
  const d = await r.json();
  if (d.ok) {
    TOKEN = d.token;
    sessionStorage.setItem('signage_token', TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    showPanel('eventos');
    initApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('signage_token');
  location.reload();
}

// ── PANEL NAV ──
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.style.display='none');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).style.display='block';
  const idx={eventos:0,agenda:1,salones:2};
  document.querySelectorAll('.nav-btn')[idx[name]].classList.add('active');
  if (name==='agenda') loadAgenda();
  if (name==='salones') renderSalonesTable();
}

// ── INIT ──
async function initApp() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('fecha-filtro').value = today;
  document.getElementById('agenda-fecha').value = today;
  updateFechaLabel();
  updateAgendaFechaLabel();
  await loadSalones();
}

async function loadSalones() {
  const r = await fetch(`${BASE}/salones`);
  allSalones = await r.json();
  renderSidebar();
  renderSalonesTable();
}

function renderSidebar() {
  const host = location.origin;
  const el = document.getElementById('sidebar-salones');
  el.innerHTML = allSalones.map(s => `
    <div class="salon-item ${s.id===activeSalonId?'sel':''}" onclick="selectSalon('${s.id}','${s.slug}','${s.nombre}')">
      <span class="salon-nm">${s.nombre}</span>
      <span class="salon-st ${s.activo?'st-on':'st-off'}">${s.activo?'Activo':'Inactivo'}</span>
    </div>`).join('');
}

async function selectSalon(id, slug, nombre) {
  activeSalonId = id;
  activeSalonSlug = slug;
  document.getElementById('ev-salon-title').textContent = nombre;
  document.getElementById('ev-salon-url').textContent = `${location.origin}/salon/${slug}`;
  document.getElementById('new-ev-btn').style.display = 'inline-block';
  document.getElementById('ev-form').style.display = 'none';
  editingEventId = null;
  renderSidebar();
  loadEventos();
}

// ── EVENTS ──
async function loadEventos() {
  if (!activeSalonId) return;
  const fecha = document.getElementById('fecha-filtro').value;
  updateFechaLabel();
  const r = await fetch(`${BASE}/eventos?salon_id=${activeSalonId}&fecha=${fecha}`, {
    headers:{'x-admin-token':TOKEN}
  });
  const evs = await r.json();
  renderEventos(evs);
}

function renderEventos(evs) {
  const el = document.getElementById('ev-list');
  if (!evs.length) {
    el.innerHTML = '<div class="empty-state">No hay eventos para este día.</div>';
    return;
  }
  el.innerHTML = evs.map(e => `
    <div class="ev-card" id="evcard-${e.id}">
      <div>
        <div class="ev-head">
          <span class="ev-nm">${e.nombre}</span>
          <span class="ev-badge">${e.tipo}</span>
          ${isActiveNow(e) ? '<span class="ev-badge" style="background:rgba(59,109,17,.15);color:#3B6D11">En curso</span>' : ''}
        </div>
        <div class="ev-meta">
          <span>📅 ${formatFecha(e.fecha)}</span>
          <span>🕐 ${e.hora_inicio.slice(0,5)} – ${e.hora_fin.slice(0,5)}</span>
          ${e.imagen_url ? '<span>🖼 Con imagen</span>' : '<span style="opacity:.5">Sin imagen</span>'}
        </div>
      </div>
      <div class="ev-actions">
        <button class="ic-btn" title="Ver tableta" onclick="window.open('/salon/${activeSalonSlug}','_blank')">👁</button>
        <button class="ic-btn" title="Editar" onclick="openEventForm('${e.id}')">✎</button>
        <button class="ic-btn del" title="Eliminar" onclick="deleteEvento('${e.id}')">✕</button>
      </div>
    </div>`).join('');
}

function isActiveNow(e) {
  const now = new Date();
  const [h,m] = [now.getHours(), now.getMinutes()];
  const cur = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  return e.fecha === new Date().toISOString().slice(0,10) && e.hora_inicio.slice(0,5) <= cur && e.hora_fin.slice(0,5) >= cur;
}

function openEventForm(id = null) {
  editingEventId = id;
  const ev = id ? getEventFromDOM(id) : null;
  const colors = ['#B8962E','#D4537E','#378ADD','#1D9E75','#9B59B6','#E74C3C','#FFFFFF'];
  selectedColor = ev?.color_acento || '#B8962E';

  const html = `
  <div class="form-card">
    <div class="form-title">${id ? 'Editar evento' : 'Nuevo evento'}</div>
    <div class="form-row">
      <div><label>Nombre del evento</label><input type="text" id="f-nombre" value="${ev?.nombre||''}" placeholder="Ej. Boda Pérez–González"></div>
      <div><label>Tipo</label>
        <select id="f-tipo">
          ${['Boda','Corporativo','Social','Quinceañero','Congreso','Conferencia','Otro'].map(t=>`<option ${ev?.tipo===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row s3">
      <div><label>Fecha</label><input type="date" id="f-fecha" value="${ev?.fecha||document.getElementById('fecha-filtro').value}"></div>
      <div><label>Hora inicio</label><input type="time" id="f-inicio" value="${ev?.hora_inicio?.slice(0,5)||''}"></div>
      <div><label>Hora fin</label><input type="time" id="f-fin" value="${ev?.hora_fin?.slice(0,5)||''}"></div>
    </div>
    <div class="form-row">
      <div><label>Subtítulo</label><textarea id="f-sub" placeholder="Ej. Ceremonia y Recepción">${ev?.subtitulo||''}</textarea></div>
      <div>
        <label>Imagen de fondo</label>
        <div class="img-drop" id="img-drop">
          <input type="file" accept="image/*" onchange="handleImgSelect(this)">
          <img class="img-thumb" id="img-thumb" ${ev?.imagen_url?`src="${ev.imagen_url}" style="display:block"`:''}> 
          <div class="img-drop-txt" id="img-drop-txt" ${ev?.imagen_url?'style="display:none"':''}>Arrastra o haz clic · JPG, PNG</div>
        </div>
        ${ev?.imagen_url?`<div style="margin-top:4px"><button class="btn-sec" style="font-size:11px;padding:4px 10px" onclick="clearImg()">Quitar imagen</button></div>`:''}
      </div>
    </div>
    <div class="form-row s1">
      <div>
        <label>Color de acento</label>
        <div class="color-row">
          ${colors.map(c=>`<div class="cswatch ${c===selectedColor?'sel':''}" style="background:${c};${c==='#FFFFFF'?'border:1px solid #ccc':''}" onclick="pickColor(this,'${c}')"></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-sec" onclick="closeEventForm()">Cancelar</button>
      <button class="btn-pri" id="save-ev-btn" onclick="saveEvento()">Guardar evento</button>
    </div>
  </div>`;

  const formEl = document.getElementById('ev-form');
  formEl.innerHTML = html;
  formEl.style.display = 'block';
  formEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

let pendingImgBase64 = null;
let pendingImgName = null;
let pendingImgType = null;
let currentImgUrl = null;

function handleImgSelect(input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  pendingImgName = file.name;
  pendingImgType = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImgBase64 = e.target.result.split(',')[1];
    document.getElementById('img-thumb').src = e.target.result;
    document.getElementById('img-thumb').style.display = 'block';
    document.getElementById('img-drop-txt').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function clearImg() {
  pendingImgBase64 = null; currentImgUrl = null;
  document.getElementById('img-thumb').style.display = 'none';
  document.getElementById('img-drop-txt').style.display = 'block';
}

function pickColor(el, c) {
  document.querySelectorAll('.cswatch').forEach(s => s.classList.remove('sel'));
  el.classList.add('sel');
  selectedColor = c;
}

function getEventFromDOM(id) {
  // fetch from memory — reload from server ideally
  return null;
}

async function saveEvento() {
  const btn = document.getElementById('save-ev-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  showSaving(true);

  let imgUrl = currentImgUrl;

  // Upload image if new one selected
  if (pendingImgBase64) {
    const ur = await fetch(`${BASE}/upload`, {
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-token':TOKEN},
      body: JSON.stringify({ file: pendingImgBase64, name: pendingImgName, type: pendingImgType })
    });
    const ud = await ur.json();
    if (ud.url) imgUrl = ud.url;
  }

  const payload = {
    salon_id: activeSalonId,
    nombre: document.getElementById('f-nombre').value,
    tipo: document.getElementById('f-tipo').value,
    subtitulo: document.getElementById('f-sub').value,
    fecha: document.getElementById('f-fecha').value,
    hora_inicio: document.getElementById('f-inicio').value,
    hora_fin: document.getElementById('f-fin').value,
    imagen_url: imgUrl,
    color_acento: selectedColor,
  };

  const url = editingEventId ? `${BASE}/eventos?id=${editingEventId}` : `${BASE}/eventos`;
  const method = editingEventId ? 'PUT' : 'POST';

  const r = await fetch(url, {
    method, headers:{'Content-Type':'application/json','x-admin-token':TOKEN},
    body: JSON.stringify(payload)
  });
  const d = await r.json();

  showSaving(false);
  if (r.ok) {
    showToast('Evento guardado correctamente');
    closeEventForm();
    pendingImgBase64 = null;
    loadEventos();
  } else {
    showToast(d.error || 'Error al guardar', true);
    btn.disabled = false; btn.textContent = 'Guardar evento';
  }
}

async function deleteEvento(id) {
  if (!confirm('¿Eliminar este evento?')) return;
  const r = await fetch(`${BASE}/eventos?id=${id}`, {
    method:'DELETE', headers:{'x-admin-token':TOKEN}
  });
  if (r.ok) { showToast('Evento eliminado'); loadEventos(); }
  else showToast('Error al eliminar', true);
}

function closeEventForm() {
  document.getElementById('ev-form').style.display = 'none';
  editingEventId = null; pendingImgBase64 = null;
}

// ── AGENDA ──
async function loadAgenda() {
  updateAgendaFechaLabel();
  const fecha = document.getElementById('agenda-fecha').value;
  const r = await fetch(`${BASE}/eventos?fecha=${fecha}`);
  const evs = await r.json();
  renderAgenda(evs);
}

function renderAgenda(evs) {
  if (!allSalones.length) return;
  const hours = Array.from({length:14},(_,i)=>i+8); // 08:00–21:00
  const typeClass = t => {
    const m={Boda:'type-boda',Corporativo:'type-corp',Social:'type-soc'};
    return m[t]||'type-otro';
  };
  const cols = `60px ${allSalones.map(()=>'1fr').join(' ')}`;
  let html = `<div class="agenda-grid" style="grid-template-columns:${cols}">`;
  // header
  html += `<div class="ag-cell" style="background:var(--dark);border-bottom:.5px solid rgba(255,255,255,.1)">Hora</div>`;
  allSalones.forEach(s => html += `<div class="ag-cell" style="background:var(--dark);border-bottom:.5px solid rgba(255,255,255,.1)">${s.nombre}</div>`);
  // rows
  hours.forEach(h => {
    const label = `${String(h).padStart(2,'0')}:00`;
    html += `<div class="ag-time">${label}</div>`;
    allSalones.forEach(s => {
      const ev = evs.find(e => e.salon_id === s.id && e.hora_inicio.slice(0,2) === String(h).padStart(2,'0'));
      html += `<div class="ag-slot">`;
      if (ev) html += `<div class="ag-ev ${typeClass(ev.tipo)}"><div class="ag-ev-nm">${ev.nombre}</div><div class="ag-ev-hr">${ev.hora_inicio.slice(0,5)}–${ev.hora_fin.slice(0,5)}</div></div>`;
      html += `</div>`;
    });
  });
  html += '</div>';
  document.getElementById('agenda-grid').innerHTML = html;
  document.getElementById('agenda-grid').style.gridTemplateColumns = cols;
}

// ── SALONES MGR ──
function renderSalonesTable() {
  const host = location.origin;
  const tbody = document.getElementById('salones-tbody');
  if (!tbody) return;
  tbody.innerHTML = allSalones.map(s => `
    <tr>
      <td><strong style="font-weight:500">${s.nombre}</strong></td>
      <td><span class="salon-url">${host}/salon/${s.slug}</span></td>
      <td>
        <button class="toggle-sw ${s.activo?'on':''}" title="${s.activo?'Desactivar':'Activar'}" onclick="toggleSalon('${s.id}',${s.activo})"></button>
      </td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="ic-btn" onclick="window.open('/salon/${s.slug}','_blank')" title="Abrir tableta">👁</button>
          <button class="ic-btn" onclick="editSalon('${s.id}')" title="Editar">✎</button>
          <button class="ic-btn del" onclick="deleteSalon('${s.id}')" title="Eliminar">✕</button>
        </div>
      </td>
    </tr>`).join('');
}

function openSalonForm(id = null) {
  editingSalonId = id;
  const s = id ? allSalones.find(x => x.id===id) : null;
  const area = document.getElementById('salon-form-area');
  if (!area) return;
  area.style.display = 'block';
  area.innerHTML = `
  <div class="form-card">
    <div class="form-title">${id ? 'Editar salón' : 'Nuevo salón'}</div>
    <div class="form-row">
      <div><label>Nombre del salón</label><input type="text" id="sf-nombre" value="${s?.nombre||''}" placeholder="Ej. Salón Imperial"></div>
      <div><label>Slug (URL)</label><input type="text" id="sf-slug" value="${s?.slug||''}" placeholder="ej. imperial" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'-')"></div>
    </div>
    <div class="form-footer">
      <button class="btn-sec" onclick="document.getElementById('salon-form-area').style.display='none'">Cancelar</button>
      <button class="btn-pri" onclick="saveSalon()">Guardar salón</button>
    </div>
  </div>`;
  area.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function editSalon(id) {
  showPanel('salones');
  openSalonForm(id);
}

async function saveSalon() {
  const payload = {
    nombre: document.getElementById('sf-nombre').value,
    slug: document.getElementById('sf-slug').value,
    activo: true,
  };
  const url = editingSalonId ? `${BASE}/salones?id=${editingSalonId}` : `${BASE}/salones`;
  const method = editingSalonId ? 'PUT' : 'POST';
  const r = await fetch(url, {
    method, headers:{'Content-Type':'application/json','x-admin-token':TOKEN},
    body: JSON.stringify(payload)
  });
  if (r.ok) {
    showToast('Salón guardado');
    document.getElementById('salon-form-area').style.display = 'none';
    await loadSalones();
  } else {
    const d = await r.json();
    showToast(d.error || 'Error', true);
  }
}

async function toggleSalon(id, current) {
  await fetch(`${BASE}/salones?id=${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json','x-admin-token':TOKEN},
    body: JSON.stringify({ activo: !current })
  });
  await loadSalones();
}

async function deleteSalon(id) {
  if (!confirm('¿Eliminar este salón y todos sus eventos?')) return;
  const r = await fetch(`${BASE}/salones?id=${id}`, {
    method:'DELETE', headers:{'x-admin-token':TOKEN}
  });
  if (r.ok) { showToast('Salón eliminado'); loadSalones(); }
  else showToast('Error al eliminar', true);
}

// ── DATE UTILS ──
function changeDate(d) {
  const el = document.getElementById('fecha-filtro');
  const dt = new Date(el.value); dt.setDate(dt.getDate()+d);
  el.value = dt.toISOString().slice(0,10);
  loadEventos();
}
function changeAgendaDate(d) {
  const el = document.getElementById('agenda-fecha');
  const dt = new Date(el.value); dt.setDate(dt.getDate()+d);
  el.value = dt.toISOString().slice(0,10);
  loadAgenda();
}
function updateFechaLabel() {
  const v = document.getElementById('fecha-filtro').value;
  const d = new Date(v+'T12:00:00');
  document.getElementById('fecha-label').textContent = d.toLocaleDateString('es-PA',{weekday:'long',day:'numeric',month:'long'});
}
function updateAgendaFechaLabel() {
  const v = document.getElementById('agenda-fecha').value;
  const d = new Date(v+'T12:00:00');
  document.getElementById('agenda-fecha-label').textContent = d.toLocaleDateString('es-PA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function formatFecha(f) {
  return new Date(f+'T12:00:00').toLocaleDateString('es-PA',{day:'numeric',month:'short',year:'numeric'});
}

// ── UI HELPERS ──
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error?' error':'');
  setTimeout(()=>t.className='toast',3000);
}
function showSaving(v) {
  document.getElementById('saving-indicator').className = 'saving' + (v?' show':'');
}

// ── SESSION RESTORE ──
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('signage_token');
  if (saved) {
    TOKEN = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    showPanel('eventos');
    initApp();
  }
});
</script>
